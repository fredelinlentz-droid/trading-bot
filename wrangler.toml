name = "trading-bot-api"
main = "cloudflare_worker/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

# KV Namespace pour rate limiting (créer avec: wrangler kv:namespace create "RATE_LIMIT")
# [[kv_namespaces]]
# binding = "KV"
# id = "VOTRE_KV_NAMESPACE_ID"

[vars]
# Variables non-sensibles seulement ici
# Les secrets sont gérés via: wrangler secret put NOM_SECRET

# Pour déployer :
# 1. wrangler login
# 2. wrangler secret put API_SECRET
# 3. wrangler secret put BACKEND_URL      (ex: https://votre-app.railway.app)
# 4. wrangler secret put INTERNAL_SECRET  (même valeur que API_SECRET ou différent)
# 5. wrangler deploy
